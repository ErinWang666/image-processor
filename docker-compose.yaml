version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: image_processor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # --- 新增: MinIO (模拟 AWS S3) ---
  minio:
    image: minio/minio:RELEASE.2024-01-31T20-20-33Z # 指定一个稳定版本
    ports:
      - "9000:9000" # API 端口 (代码连这个)
      - "9001:9001" # 控制台端口 (浏览器连这个)
    environment:
      MINIO_ROOT_USER: admin # 相当于 AWS Access Key
      MINIO_ROOT_PASSWORD: password # 相当于 AWS Secret Key
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data: # --- 新增: 确保 MinIO 数据持久化 ---
